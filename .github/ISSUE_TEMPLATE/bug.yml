name: Bug report
description: Report a reproducible problem using fictional data.
title: "[bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not include a real bank statement, transaction, screenshot, filename, balance, or account detail.
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Use the built-in demo or a minimal, completely fictional CSV.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and operating system
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I confirm that this report contains no real personal or financial data.
          required: true
