name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  logic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run shipping-logic suite
        run: node test-logic.js
